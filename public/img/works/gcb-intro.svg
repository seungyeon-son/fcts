    <ellipse cx="300" cy="410" rx="74" ry="190"/>
    <ellipse cx="300" cy="410" rx="140" ry="190"/>
    <line x1="110" y1="410" x2="490" y2="410"/>
    <path d="M138 310 Q300 268 462 310"/>
    <path d="M138 510 Q300 552 462 510"/>
  </g>

  <!-- language glyphs -->
  <g font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="23" font-weight="600" fill="#CDCDCD">
    <text x="150" y="225">A</text><text x="430" y="235">文</text><text x="112" y="392">한</text><text x="472" y="405">あ</text><text x="402" y="560">ع</text>
  </g>

  <!-- broken barrier -->
  <g stroke="#C9C9C9" stroke-width="2" stroke-dasharray="6 7">
    <line x1="300" y1="176" x2="300" y2="412"/><line x1="300" y1="492" x2="300" y2="642"/>
  </g>

  <!-- 9-step journey -->
  <polyline points="112,592 158,568 204,532 252,492 300,452 352,408 404,366 452,320 500,272" fill="none" stroke="#0D0D0D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
