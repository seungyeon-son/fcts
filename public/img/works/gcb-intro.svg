<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Global Credit Bank cover">
  <defs>
    <pattern id="d_gcb" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_gcb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_gcb)"/>
  <rect width="600" height="800" fill="url(#d_gcb)"/>

  <rect x="40" y="44" width="164" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="122" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">B2C · Global UX</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">GCB</text>

  <!-- globe backdrop -->
  <g stroke="#E6E6E6" stroke-width="1.5" fill="none">
