    <circle cx="112" cy="592" r="7.5"/><circle cx="158" cy="568" r="7.5"/><circle cx="204" cy="532" r="7.5"/><circle cx="252" cy="492" r="7.5"/><circle cx="352" cy="408" r="7.5"/><circle cx="404" cy="366" r="7.5"/><circle cx="452" cy="320" r="7.5"/><circle cx="500" cy="272" r="7.5"/>
  </g>
  <circle cx="300" cy="452" r="16" fill="none" stroke="#FF3229" stroke-width="2" opacity="0.35"/>
  <circle cx="300" cy="452" r="10" fill="#FF3229"/>
  <g font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="600" fill="#9A9A9A">
