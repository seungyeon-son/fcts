<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Grecture cover">
  <defs>
    <pattern id="d_gr" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_gr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_gr)"/>
  <rect width="600" height="800" fill="url(#d_gr)"/>

  <rect x="40" y="44" width="150" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="115" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">B2C · EdTech</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">GRECTURE</text>

  <!-- 8 section slots (universal layout) -->
  <g>
    <rect x="150" y="180" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="236" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="292" width="300" height="44" rx="6" fill="#0D0D0D"/>
    <rect x="150" y="348" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="404" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="460" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="516" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
    <rect x="150" y="572" width="300" height="44" rx="6" fill="#F2F2F2" stroke="#E4E4E4"/>
  </g>
  <!-- slot label on the dark (immersive) section -->
  <text x="300" y="320" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">IMMERSE</text>

  <!-- 5-act flow curve threading the slots -->
  <path d="M120 596 C 200 596 210 300 300 314 C 390 328 400 200 480 204" fill="none" stroke="#FF3229" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="120" cy="596" r="6" fill="#FF3229"/>
  <circle cx="480" cy="204" r="9" fill="#FF3229"/>
  <circle cx="480" cy="204" r="15" fill="none" stroke="#FF3229" stroke-width="2" opacity="0.35"/>

  <!-- 5 act ticks -->
  <g font-family="'Pretendard',sans-serif" font-size="11" font-weight="700" fill="#B4B4B4" letter-spacing="1">
    <text x="470" y="660" text-anchor="end">ATTRACT · ORIENT · IMMERSE · DEEPEN · CONVERT</text>
  </g>
</svg>
