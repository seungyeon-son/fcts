<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SunNano cover">
  <defs>
    <pattern id="d_sn" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_sn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
    <linearGradient id="ray_sn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFE08A" stop-opacity="0.9"/><stop offset="1" stop-color="#FFE08A" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_sn)"/>
  <rect width="600" height="800" fill="url(#d_sn)"/>

  <rect x="40" y="44" width="140" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="110" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">Web · Renewal</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">SUNNANO</text>

  <!-- sun -->
  <circle cx="180" cy="210" r="34" fill="#FF3229" opacity="0.9"/>
  <g stroke="#FF3229" stroke-width="2.4" stroke-linecap="round" opacity="0.5">
    <line x1="180" y1="150" x2="180" y2="132"/><line x1="222" y1="168" x2="234" y2="156"/><line x1="138" y1="168" x2="126" y2="156"/><line x1="240" y1="210" x2="258" y2="210"/>
  </g>

  <!-- light ray passing through film layers -->
  <path d="M180 210 L470 640 L360 640 L150 240 Z" fill="url(#ray_sn)"/>

  <!-- 7 film layers -->
  <g>
    <rect x="150" y="360" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.86"/>
    <rect x="150" y="398" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.72"/>
    <rect x="150" y="436" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.58"/>
    <rect x="150" y="474" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.44"/>
    <rect x="150" y="512" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.32"/>
    <rect x="150" y="550" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.22"/>
    <rect x="150" y="588" width="320" height="30" rx="4" fill="#0D0D0D" opacity="0.14"/>
  </g>

  <g font-family="'Pretendard',sans-serif" font-size="12" font-weight="700" fill="#B4B4B4" letter-spacing="1">
    <text x="150" y="672">7 라인업 · 빛을 걸러내는 30년 필름 브랜드</text>
  </g>
</svg>
