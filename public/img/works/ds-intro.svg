<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SDT Design System cover">
  <defs>
    <pattern id="d_ds" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_ds" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_ds)"/>
  <rect width="600" height="800" fill="url(#d_ds)"/>

  <rect x="40" y="44" width="176" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="128" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">B2B · Design System</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">TOKENS</text>

  <!-- Stage 1: token dots grid -->
  <g>
    <text x="118" y="210" font-family="'Pretendard',sans-serif" font-size="12" font-weight="700" fill="#AEAEAE" letter-spacing="1">TOKEN</text>
    <g fill="#D8D8D8">
      <circle cx="120" cy="250" r="9"/><circle cx="152" cy="250" r="9"/><circle cx="184" cy="250" r="9"/>
      <circle cx="120" cy="282" r="9"/><circle cx="152" cy="282" r="9"/><circle cx="184" cy="282" r="9"/>
      <circle cx="120" cy="314" r="9"/><circle cx="152" cy="314" r="9"/>
    </g>
    <circle cx="184" cy="314" r="9" fill="#FF3229"/>
  </g>

  <!-- arrow -->
  <path d="M235 288 L285 288" stroke="#0D0D0D" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M278 281 L287 288 L278 295" fill="none" stroke="#0D0D0D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stage 2: atomic component -->
  <g>
    <text x="318" y="210" font-family="'Pretendard',sans-serif" font-size="12" font-weight="700" fill="#AEAEAE" letter-spacing="1">ATOM</text>
    <rect x="318" y="236" width="150" height="40" rx="8" fill="#0D0D0D"/>
    <text x="393" y="261" text-anchor="middle" font-family="'Pretendard',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Button</text>
    <rect x="318" y="288" width="150" height="34" rx="6" fill="#FFFFFF" stroke="#DDDDDD"/>
    <rect x="326" y="300" width="70" height="10" rx="5" fill="#E6E6E6"/>
  </g>

  <!-- Stage 3: page template assembled -->
  <g transform="translate(150,392)">
    <rect x="0" y="0" width="300" height="300" rx="10" fill="#FFFFFF" stroke="#E2E2E2"/>
    <rect x="0" y="0" width="300" height="40" rx="10" fill="#0D0D0D"/>
    <rect x="0" y="30" width="300" height="10" fill="#0D0D0D"/>
    <circle cx="24" cy="20" r="5" fill="#FF3229"/>
    <rect x="44" y="15" width="70" height="10" rx="5" fill="#4A4A4A"/>
    <rect x="20" y="66" width="70" height="214" rx="6" fill="#F5F5F5"/>
    <rect x="106" y="66" width="174" height="90" rx="6" fill="#F5F5F5"/>
    <rect x="106" y="168" width="82" height="112" rx="6" fill="#F5F5F5"/>
    <rect x="198" y="168" width="82" height="112" rx="6" fill="#F5F5F5"/>
  </g>
  <text x="300" y="726" text-anchor="middle" font-family="'Pretendard',sans-serif" font-size="12" font-weight="700" fill="#B4B4B4" letter-spacing="3">TOKEN → ATOM → TEMPLATE</text>
</svg>
