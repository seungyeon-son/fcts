<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dear Klairs cover">
  <defs>
    <pattern id="d_kl" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_kl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
    <linearGradient id="drop_kl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F1F1F1"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_kl)"/>
  <rect width="600" height="800" fill="url(#d_kl)"/>

  <rect x="40" y="44" width="126" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="103" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">Web · Global</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">KLAIRS</text>

  <!-- droplet -->
  <path d="M300 210 C 300 210 372 320 372 388 A72 72 0 1 1 228 388 C 228 320 300 210 300 210 Z" fill="url(#drop_kl)" stroke="#0D0D0D" stroke-width="2.4"/>
  <!-- highlight -->
  <ellipse cx="270" cy="380" rx="16" ry="24" fill="#FFFFFF"/>
  <circle cx="330" cy="430" r="7" fill="#FF3229"/>

  <!-- 3-axis brand story dots -->
  <g>
    <circle cx="180" cy="600" r="10" fill="#0D0D0D"/>
    <line x1="196" y1="600" x2="264" y2="600" stroke="#DADADA" stroke-width="2"/>
    <circle cx="280" cy="600" r="10" fill="#0D0D0D"/>
    <line x1="296" y1="600" x2="364" y2="600" stroke="#DADADA" stroke-width="2"/>
    <circle cx="380" cy="600" r="10" fill="#FF3229"/>
  </g>
  <g font-family="'Pretendard',sans-serif" font-size="11" font-weight="700" fill="#9A9A9A" text-anchor="middle">
    <text x="180" y="632">Philosophy</text><text x="280" y="632">Global</text><text x="392" y="632">Proven</text>
