  <text x="300" y="694" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="12" font-weight="700" fill="#B4B4B4" letter-spacing="1">Positive Beauty · 80+개국 비건 스킨케어</text>
