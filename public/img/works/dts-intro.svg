<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DTS cover">
  <defs>
    <pattern id="d_dt" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#F0F0F0"/></pattern>
    <linearGradient id="f_dt" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FAFAFA"/></linearGradient>
    <linearGradient id="temp_dt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#EAB308"/><stop offset="0.5" stop-color="#F97316"/><stop offset="0.8" stop-color="#EF5330"/><stop offset="1" stop-color="#FF3229"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#f_dt)"/>
  <rect width="600" height="800" fill="url(#d_dt)"/>

  <rect x="40" y="44" width="164" height="30" rx="15" fill="rgba(255,50,41,0.08)"/>
  <text x="122" y="64" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#FF3229" letter-spacing="0.5">B2B · Monitoring</text>
  <text x="560" y="64" text-anchor="end" font-family="'Pretendard',sans-serif" font-size="13" font-weight="700" fill="#CFCFCF" letter-spacing="1">DTS</text>

  <!-- map panel -->
  <rect x="110" y="150" width="380" height="330" rx="10" fill="#FFFFFF" stroke="#E2E2E2"/>
  <!-- fiber route line -->
  <path d="M150 430 C 240 360 200 250 300 240 C 400 230 380 380 450 320" fill="none" stroke="#D5D5D5" stroke-width="2.5" stroke-dasharray="2 6"/>
  <!-- faint grid -->
  <g stroke="#F1F1F1" stroke-width="1">
    <line x1="110" y1="260" x2="490" y2="260"/><line x1="110" y1="370" x2="490" y2="370"/><line x1="237" y1="150" x2="237" y2="480"/><line x1="364" y1="150" x2="364" y2="480"/>
  </g>

  <!-- alert pins: 4-step hierarchy -->
  <g stroke="#FFFFFF" stroke-width="2">
    <circle cx="180" cy="420" r="11" fill="#EAB308"/>
    <circle cx="270" cy="250" r="11" fill="#F97316"/>
    <circle cx="360" cy="360" r="11" fill="#EF5330"/>
    <circle cx="435" cy="318" r="15" fill="#FF3229"/>
  </g>
  <!-- multi-alarm count on critical pin -->
  <text x="435" y="323" text-anchor="middle" font-family="'Pretendard',sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">5</text>
  <circle cx="435" cy="318" r="23" fill="none" stroke="#FF3229" stroke-width="2" opacity="0.3"/>

  <!-- temperature gradient bar -->
  <rect x="110" y="530" width="380" height="26" rx="13" fill="url(#temp_dt)"/>
  <g font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="12" font-weight="700" fill="#8A8A8A" text-anchor="middle">
    <text x="150" y="590">관심</text><text x="256" y="590">주의</text><text x="362" y="590">경계</text><text x="460" y="590">심각</text>
  </g>

  <text x="300" y="662" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="12" font-weight="700" fill="#B4B4B4" letter-spacing="1">실시간 온도 경보를 4단계 위계 색으로</text>
</svg>
